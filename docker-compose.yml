services:
  api:
    build: .
    ports:
      - "5005:8080"
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=numerologia;
        Username=numerologia;Password=numerologia
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: numerologia
      POSTGRES_USER: numerologia
      POSTGRES_PASSWORD: numerologia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numerologia"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── POCs de framework UI (sem banco — dados mockados) ──────────────────────
  # Subir um:    docker compose --profile pocs up poc-mudblazor
  # Subir todos: docker compose --profile pocs up
  # Ou sem profile (sobrescreve): docker compose up poc-mudblazor

  poc-mudblazor:
    build:
      context: .
      dockerfile: pocs/poc-mudblazor/Dockerfile
    ports:
      - "5010:8080"
    profiles: ["pocs"]

  poc-blazorbootstrap:
    build:
      context: .
      dockerfile: pocs/poc-blazorbootstrap/Dockerfile
    ports:
      - "5013:8080"
    profiles: ["pocs"]

volumes:
  postgres_data:
