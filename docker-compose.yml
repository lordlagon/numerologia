services:
  api:
    build: .
    ports:
      - "5005:8080"
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=numerologia;
        Username=numerologia;Password=numerologia
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: numerologia
      POSTGRES_USER: numerologia
      POSTGRES_PASSWORD: numerologia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numerologia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
