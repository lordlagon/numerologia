name: CD — Production

on:
  push:
    branches:
      - main

# Impede deploys concorrentes em produção
concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet restore
      - run: dotnet test --no-restore --collect:"XPlat Code Coverage" --results-directory coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-production
          path: coverage

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet restore
      - name: Check vulnerable packages
        run: dotnet list package --vulnerable --include-transitive
      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy → Railway Production
    runs-on: ubuntu-latest
    needs: [test, security]
    environment:
      name: "production"
      url: ${{ vars.RAILWAY_PRODUCTION_URL }}     
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/railwayapp/cli/releases/latest/download/railway-linux-x64.tar.gz -o railway.tar.gz
          tar -xzf railway.tar.gz -C ~/.local/bin
          chmod +x ~/.local/bin/railway
          echo ~/.local/bin >> $GITHUB_PATH

      - name: Deploy (production)        
        run: railway up --service numerologia --environment ${{ vars.RAILWAY_ENVIRONMENT }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
